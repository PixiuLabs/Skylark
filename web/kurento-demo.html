<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云雀 (Skylark) - Kurento WebRTC 实时通话</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 14px;
            opacity: 0.9;
        }

        .status-bar {
            background: #f8f9fa;
            padding: 12px 30px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #6c757d;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #28a745;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message-content {
            max-width: 70%;
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message-time {
            font-size: 11px;
            color: #6c757d;
            margin-top: 4px;
        }

        .message.user .message-time {
            color: rgba(255, 255, 255, 0.8);
        }

        .system-message {
            text-align: center;
            color: #6c757d;
            font-size: 13px;
            margin: 10px 0;
            font-style: italic;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px 20px;
            border-radius: 8px;
            margin: 10px 0;
            font-size: 13px;
            border: 1px solid #c3e6cb;
        }

        .input-area {
            background: white;
            border-top: 1px solid #e9ecef;
            padding: 20px 30px;
        }

        .volume-indicator {
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .volume-bar {
            height: 100%;
            background: linear-gradient(90deg, #28a745 0%, #ffc107 50%, #dc3545 100%);
            width: 0%;
            transition: width 0.1s ease-out;
        }

        .input-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .text-input {
            flex: 1;
            border: 2px solid #e9ecef;
            border-radius: 25px;
            padding: 12px 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            border-color: #667eea;
        }

        .btn {
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn.recording {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            animation: recordingPulse 1.5s infinite;
        }

        @keyframes recordingPulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(220, 53, 69, 0);
            }
        }

        .audio-container {
            display: none;
        }

        .messages::-webkit-scrollbar {
            width: 8px;
        }

        .messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        .messages::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        @media (max-width: 768px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }

            .header h1 {
                font-size: 22px;
            }

            .messages {
                padding: 15px 20px;
            }

            .input-area {
                padding: 15px 20px;
            }

            .message-content {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ 云雀 (Skylark) - Kurento WebRTC</h1>
            <div class="subtitle">基于 Kurento 的智能语音对话</div>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">未连接</span>
            </div>
            <div class="status-indicator">
                <span id="modeText">准备中...</span>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="system-message">欢迎使用云雀Kurento WebRTC智能语音对话！</div>
            <div class="system-message">先连接WebSocket，然后开始语音对话</div>
            <div class="system-message">⚠️ 注意：需要Kurento Media Server运行在ws://localhost:8888/kurento</div>
        </div>

        <div class="input-area">
            <div class="volume-indicator">
                <div class="volume-bar" id="volumeBar"></div>
            </div>
            <div class="input-controls">
                <input 
                    type="text" 
                    class="text-input" 
                    id="textInput" 
                    placeholder="输入消息或点击开始对话..."
                    disabled
                >
                <button class="btn" id="sendBtn" disabled>
                    <span>� 发送</span>
                </button>
                <button class="btn" id="callBtn" disabled>
                    <span>📞 开始对话</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Audio elements (hidden) -->
    <div class="audio-container">
        <audio id="localAudio" autoplay muted></audio>
        <audio id="remoteAudio" autoplay></audio>
    </div>

    <!-- Kurento WebRTC Client (native implementation) -->
    <script src="js/kurento-webrtc.js"></script>
    
    <script>
        class KurentoVoiceAssistant {
            constructor() {
                this.ws = null;
                this.kurentoClient = null;
                this.audioContext = null;
                this.mediaStream = null;
                this.processor = null;
                this.isConnected = false;
                this.isCallActive = false;
                this.lastSentText = null;
                
                this.elements = {
                    messages: document.getElementById('messages'),
                    textInput: document.getElementById('textInput'),
                    sendBtn: document.getElementById('sendBtn'),
                    callBtn: document.getElementById('callBtn'),
                    statusDot: document.getElementById('statusDot'),
                    statusText: document.getElementById('statusText'),
                    modeText: document.getElementById('modeText'),
                    volumeBar: document.getElementById('volumeBar')
                };

                this.init();
            }

            init() {
                this.connectWebSocket();
                this.setupEventListeners();
            }

            connectWebSocket() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const host = window.location.host || 'localhost:8080';
                const wsUrl = `${protocol}//${host}/ws/webrtc`;
                
                this.addSystemMessage('正在连接WebSocket服务器...');

                try {
                    this.ws = new WebSocket(wsUrl);

                    this.ws.onopen = () => {
                        this.isConnected = true;
                        this.updateStatus('已连接', true);
                        this.addSystemMessage('WebSocket连接成功！');
                        this.elements.textInput.disabled = false;
                        this.elements.sendBtn.disabled = false;
                        this.elements.callBtn.disabled = false;
                        this.elements.modeText.textContent = '就绪';
                    };

                    this.ws.onmessage = (event) => {
                        this.handleMessage(event.data);
                    };

                    this.ws.onerror = (error) => {
                        console.error('WebSocket错误:', error);
                        this.addErrorMessage('连接错误，请检查服务是否启动');
                    };

                    this.ws.onclose = () => {
                        this.isConnected = false;
                        this.updateStatus('连接断开', false);
                        this.addSystemMessage('服务器连接已断开');
                        this.elements.textInput.disabled = true;
                        this.elements.sendBtn.disabled = true;
                        this.elements.callBtn.disabled = true;

                        if (this.isCallActive) {
                            this.endCall();
                        }

                        setTimeout(() => {
                            this.addSystemMessage('5秒后尝试重新连接...');
                            setTimeout(() => this.connectWebSocket(), 5000);
                        }, 1000);
                    };
                } catch (error) {
                    console.error('WebSocket连接失败:', error);
                    this.addErrorMessage('无法连接到服务器');
                }
            }

            setupEventListeners() {
                this.elements.sendBtn.addEventListener('click', () => {
                    this.sendTextMessage();
                });

                this.elements.textInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        this.sendTextMessage();
                    }
                });

                this.elements.callBtn.addEventListener('click', () => {
                    this.toggleCall();
                });
            }

            async toggleCall() {
                if (this.isCallActive) {
                    this.endCall();
                } else {
                    await this.startCall();
                }
            }

            async startCall() {
                try {
                    this.addSystemMessage('正在启动Kurento WebRTC对话...');
                    
                    // Create new Kurento client
                    this.kurentoClient = new KurentoWebRTCClient();
                    
                    // Set callbacks
                    this.kurentoClient.setStatusCallback(updateStatus);
                    this.kurentoClient.setMessageCallback(handleKurentoMessage);
                    
                    // First, get user media for audio processing
                    this.mediaStream = await navigator.mediaDevices.getUserMedia({
                        audio: {
                            channelCount: 1,
                            sampleRate: 16000,
                            echoCancellation: true,
                            noiseSuppression: true,
                            autoGainControl: true
                        }
                    });

                    // Create audio context for processing
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)({
                        sampleRate: 16000
                    });
                    const source = this.audioContext.createMediaStreamSource(this.mediaStream);
                    
                    // Create processor for audio data
                    this.processor = this.audioContext.createScriptProcessor(4096, 1, 1);

                    this.processor.onaudioprocess = (e) => {
                        if (this.isCallActive && this.ws && this.ws.readyState === WebSocket.OPEN) {
                            const inputData = e.inputBuffer.getChannelData(0);
                            const pcmData = this.float32ToInt16(inputData);
                            
                            const volume = this.calculateVolume(inputData);
                            this.updateVolume(volume);

                            this.ws.send(pcmData.buffer);
                        }
                    };

                    source.connect(this.processor);
                    this.processor.connect(this.audioContext.destination);

                    // Start Kurento session
                    await this.kurentoClient.start();
                    
                    this.isCallActive = true;
                    this.elements.callBtn.classList.add('recording');
                    this.elements.callBtn.innerHTML = '<span>⏸️ 结束对话</span>';
                    this.elements.modeText.textContent = '对话中...';
                    this.addSystemMessage('语音对话已开始！');
                    
                } catch (error) {
                    console.error('Failed to start call:', error);
                    this.addErrorMessage('启动通话失败: ' + error.message);
                }
            }

            endCall() {
                this.isCallActive = false;

                if (this.kurentoClient) {
                    this.kurentoClient.stop();
                    this.kurentoClient = null;
                }

                if (this.processor) {
                    this.processor.disconnect();
                    this.processor = null;
                }

                if (this.audioContext) {
                    this.audioContext.close();
                    this.audioContext = null;
                }

                if (this.mediaStream) {
                    this.mediaStream.getTracks().forEach(track => track.stop());
                    this.mediaStream = null;
                }

                this.elements.callBtn.classList.remove('recording');
                this.elements.callBtn.innerHTML = '<span>📞 开始对话</span>';
                this.elements.modeText.textContent = '就绪';
                this.elements.volumeBar.style.width = '0%';
                this.addSystemMessage('语音对话已结束');
            }

            float32ToInt16(float32Array) {
                const int16Array = new Int16Array(float32Array.length);
                for (let i = 0; i < float32Array.length; i++) {
                    const s = Math.max(-1, Math.min(1, float32Array[i]));
                    int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                }
                return int16Array;
            }

            calculateVolume(float32Array) {
                let sum = 0;
                for (let i = 0; i < float32Array.length; i++) {
                    sum += float32Array[i] * float32Array[i];
                }
                return Math.sqrt(sum / float32Array.length);
            }

            updateVolume(volume) {
                const percentage = Math.min(100, volume * 500);
                this.elements.volumeBar.style.width = percentage + '%';
            }

            sendTextMessage() {
                const text = this.elements.textInput.value.trim();
                if (!text || !this.isConnected) return;

                this.addMessage(text, 'user');
                this.lastSentText = text;
                this.elements.textInput.value = '';

                this.sendSignalingMessage('text', { content: text });
            }

            sendSignalingMessage(type, data) {
                if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                    const message = JSON.stringify({ type, ...data });
                    this.ws.send(message);
                }
            }

            handleMessage(data) {
                try {
                    const message = JSON.parse(data);
                    
                    switch (message.type) {
                        case 'connected':
                            console.log('Connected with session ID:', message.sessionId);
                            break;
                        
                        case 'answer':
                            console.log('Received WebRTC answer:', message);
                            break;
                        
                        case 'asr_result':
                            if (message.data && message.data.text) {
                                if (message.data.text !== this.lastSentText) {
                                    this.addMessage(message.data.text, 'user');
                                } else {
                                    this.lastSentText = null;
                                }
                            }
                            break;
                        
                        case 'llm_response':
                            if (message.data && message.data.text) {
                                this.addMessage(message.data.text, 'assistant');
                            }
                            break;
                        
                        case 'tts_audio':
                            if (message.data && message.data.audio) {
                                this.playAudio(message.data.audio);
                            }
                            break;
                        
                        case 'error':
                            this.addErrorMessage(message.data ? message.data.message : message.message);
                            break;
                        
                        default:
                            console.log('Unknown message type:', message.type);
                    }
                } catch (error) {
                    console.error('消息处理错误:', error);
                }
            }

            playAudio(base64Audio) {
                try {
                    const audio = new Audio('data:audio/wav;base64,' + base64Audio);
                    audio.play();
                } catch (error) {
                    console.error('音频播放失败:', error);
                }
            }

            addMessage(text, role) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;

                const avatar = document.createElement('div');
                avatar.className = 'message-avatar';
                avatar.textContent = role === 'user' ? '👤' : '🤖';

                const content = document.createElement('div');
                content.className = 'message-content';
                
                const textDiv = document.createElement('div');
                textDiv.textContent = text;
                
                const time = document.createElement('div');
                time.className = 'message-time';
                time.textContent = new Date().toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });

                content.appendChild(textDiv);
                content.appendChild(time);

                messageDiv.appendChild(avatar);
                messageDiv.appendChild(content);

                this.elements.messages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addSystemMessage(text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'system-message';
                messageDiv.textContent = text;
                this.elements.messages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addErrorMessage(text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'error-message';
                messageDiv.textContent = '❌ ' + text;
                this.elements.messages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            addSuccessMessage(text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'success-message';
                messageDiv.textContent = '✅ ' + text;
                this.elements.messages.appendChild(messageDiv);
                this.scrollToBottom();
            }

            updateStatus(text, isConnected) {
                this.elements.statusText.textContent = text;
                if (isConnected) {
                    this.elements.statusDot.classList.add('connected');
                } else {
                    this.elements.statusDot.classList.remove('connected');
                }
            }

            scrollToBottom() {
                this.elements.messages.scrollTop = this.elements.messages.scrollHeight;
            }
        }

        // Helper functions for Kurento callbacks
        function updateStatus(state, text) {
            console.log('Kurento status:', state, '-', text);
        }

        function handleKurentoMessage(type, data) {
            console.log('Kurento message:', type, data);
        }

        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            new KurentoVoiceAssistant();
        });
    </script>
</body>
</html>
