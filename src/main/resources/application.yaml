# Skylark Voice Agent Configuration
# 云雀智能语音助手配置

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.groovy.template.GroovyTemplateAutoConfiguration

server:
  port: 8080

# ASR Configuration
asr:
  model:
    path: models/vosk-model-small-cn-0.22
  temp:
    dir: temp/asr

# TTS Configuration
tts:
  voice: cmu-slt-hsmm
  url: http://localhost:59125
  temp:
    dir: temp/tts

# VAD Configuration
vad:
  model:
    path: models/silero_vad.onnx
  sampling:
    rate: 16000
  threshold: 0.5
  min:
    silence:
      duration:
        ms: 500

# Kurento Configuration (deprecated, use webrtc.kurento instead)
kurento:
  ws:
    uri: ws://localhost:8888/kurento

# WebRTC Configuration
webrtc:
  # Active strategy: websocket, kurento, livekit, or agora
  strategy: kurento
  kurento:
    ws-uri: ws://localhost:8888/kurento
  livekit:
    url: "http://localhost:7880"
    api-key: "devkey"
    api-secret: "secret"
  # Agora (声网) Configuration
  agora:
    app-id: ""
    app-certificate: ""
    region: "cn"
    sample-rate: 16000
    channels: 1
    token-expire-seconds: 3600
  # Alibaba Cloud RTC (阿里云 ARTC) Configuration
  alirtc:
    app-id: ""                    # 阿里云 ARTC AppId（在控制台创建应用获取）
    app-key: ""                   # 阿里云 ARTC AppKey（鉴权签名用）
    app-secret: ""                # 阿里云 ARTC AppSecret（HMAC-SHA256 签名密钥）
    region: "cn"
    sample-rate: 16000
    channels: 1
    token-ttl-seconds: 3600
  stun:
    server: stun:stun.l.google.com:19302
  turn:
    enabled: false
    server: ""
    username: ""
    password: ""
    transport: udp

# LLM (Large Language Model) Configuration
llm:
  # API Key（从环境变量 DEEPSEEK_API_KEY 读取，未设置时使用空字符串）
  api-key: ${DEEPSEEK_API_KEY:}
  model-name: meta/llama-3.3-70b-instruct
  base-url: https://integrate.api.nvidia.com/v1

# Logging Configuration
logging:
  level:
    org.skylark: INFO
    root: INFO
